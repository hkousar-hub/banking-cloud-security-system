name: CI/CD - Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t kouserdev/banking-app:latest .

      - name: Push to Docker Hub
        run: docker push kouserdev/banking-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull kouserdev/banking-app:latest
            sudo docker stop banking-app || true
            sudo docker rm banking-app || true
            sudo docker run -d \
              -p 80:80 \
              -e JWT_SECRET=supersecret \
              -v banking-data:/app/data \
              --name banking-app \
              --restart always \
              kouserdev/banking-app:latest
            sudo docker image prune -f