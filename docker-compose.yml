

services:
  backend:
    build: ./backend
    image: kouserdev/banking-backend:latest
    ports:
      - "5000:5000"
    environment:
      - JWT_SECRET=supersecret
    depends_on: []

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    image: kouserdev/banking-frontend:latest
    ports:
        - "5173:80"
    depends_on:
      - backend